<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Welcome — Pre-boarding</title>
  <style>
    :root { --brand:#6366f1; --ok:#16a34a; --bg:#f1f5f9; --card:#fff; --line:#e5e7eb; --muted:#64748b; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:var(--bg); color:#0f172a; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 20px 16px 60px; }
    .head { text-align:center; padding: 22px 0 10px; }
    .head img { max-height: 56px; margin-bottom: 8px; }
    .head h1 { font-size: 22px; margin: 4px 0; }
    .head p { color: var(--muted); margin: 2px 0; font-size: 14px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:18px; margin-top:16px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
    .card h2 { font-size: 16px; margin: 0 0 12px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .sub { grid-column:1/-1; font-weight:700; color:#475569; font-size:13px; margin:6px 0 -2px; }
    .field { display:flex; flex-direction:column; gap:4px; }
    .field.full { grid-column: 1/-1; }
    label { font-size: 12px; color: var(--muted); font-weight:600; }
    label .req { color:#dc2626; }
    input, select, textarea { padding:9px 10px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit; width:100%; }
    .field.bad input, .field.bad select, .field.bad textarea { border-color:#dc2626; background:#fff5f5; }
    .field.bad label { color:#dc2626; }
    textarea { resize: vertical; }
    .btn { background:var(--brand); color:#fff; border:0; border-radius:9px; padding:10px 16px; font-size:14px; font-weight:600; cursor:pointer; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn.secondary { background:#eef2ff; color:var(--brand); }
    .btn.sm { padding:6px 11px; font-size:13px; }
    .row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); }
    .row:last-child { border-bottom:0; }
    .row .name { flex:1; font-size:14px; }
    .tag { font-size:11px; padding:2px 8px; border-radius:20px; font-weight:600; white-space:nowrap; }
    .tag.ok { background:#dcfce7; color:#166534; }
    .tag.wait { background:#fef9c3; color:#854d0e; }
    .tag.miss { background:#fee2e2; color:#991b1b; }
    .note { background:#eff6ff; border-left:4px solid #2563eb; padding:12px 14px; border-radius:8px; font-size:13px; color:#1e3a8a; }
    .ok-banner { background:#ecfdf5; border-left:4px solid var(--ok); padding:12px 14px; border-radius:8px; font-size:14px; color:#065f46; }
    .center { text-align:center; }
    .muted { color: var(--muted); font-size: 13px; }
    .toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#0f172a; color:#fff; padding:10px 16px; border-radius:8px; font-size:14px; opacity:0; transition:opacity .2s; z-index:50; }
    .toast.show { opacity:1; }
    .timer-bar { position:sticky; top:0; z-index:10; background:#eef2ff; color:#3730a3; text-align:center; padding:9px 12px; border-radius:10px; font-weight:700; font-size:14px; margin-bottom:8px; }
    .timer-bar.urgent { background:#fff7ed; color:#c2410c; }
    .timer-bar.expired { background:#fee2e2; color:#991b1b; }
    .hide { display:none; }
    @media (max-width:560px){ .grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div id="logo"></div>
      <h1 id="welcome">Welcome</h1>
      <p id="company"></p>
      <p>Pre-boarding · <b>no login needed</b></p>
    </div>
    <div id="timer" class="timer-bar hide"></div>
    <div id="content"><div class="card center muted">Loading…</div></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="/preboard.js?v=4"></script>
</body>
</html>
