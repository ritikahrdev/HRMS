<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiring Requirement</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(135deg,#eef2ff,#faf5ff);color:#1f2937;min-height:100vh}
    .wrap{max-width:640px;margin:0 auto;padding:32px 18px 60px}
    .card{background:#fff;border-radius:18px;box-shadow:0 12px 40px rgba(79,70,229,.12);padding:26px 28px}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
    .brand .logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#4f46e5,#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}
    h1{font-size:21px;margin:14px 0 2px}
    .sub{color:#6b7280;font-size:13.5px;margin:0 0 18px}
    label{display:block;font-size:12.5px;font-weight:600;color:#4b5563;margin:14px 0 5px}
    input,select,textarea{width:100%;border:1px solid #e5e1f3;border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit;outline:none;background:#fff}
    input:focus,select:focus,textarea:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,.12)}
    textarea{resize:vertical;min-height:74px}
    .row{display:flex;gap:12px}.row>div{flex:1}
    .hint{font-size:11.5px;color:#9ca3af;margin-top:3px}
    button{margin-top:22px;width:100%;border:none;border-radius:11px;padding:13px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-weight:700;font-size:15px;cursor:pointer}
    button:disabled{opacity:.6;cursor:default}
    .msg{padding:14px 16px;border-radius:12px;font-size:14px;margin-top:8px}
    .ok{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
    .err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
    .center{text-align:center;padding:40px 10px}
    .center .big{font-size:46px}
  </style>
</head>
<body>
  <div class="wrap"><div class="card" id="card"><div class="center"><div class="big">⏳</div><p class="sub">Loading…</p></div></div></div>
  <!-- Script is external (not inline) so it satisfies the app CSP: script-src 'self'. -->
  <script src="/requisition.js?v=2"></script>
</body>
</html>
