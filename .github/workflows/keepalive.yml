name: HRMS keep-alive

# Pings the live HRMS every ~10 minutes so the free Render tier never sees it as
# idle (it sleeps after ~15 minutes with no inbound requests). /api/health is a
# tiny no-op that just wakes / keeps the server warm — no side effects.
#
# This repo is PUBLIC, so GitHub Actions minutes are free and unlimited.
#
# NOTE: GitHub's scheduled runs are "best effort" and can be delayed under load,
# so a rare cold start is still possible. For guaranteed zero cold starts, a free
# external uptime pinger (e.g. cron-job.org or UptimeRobot at a 5-minute interval)
# pointed at the same /api/health URL is even more reliable.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes (UTC)
  workflow_dispatch: {}        # also runnable on demand from the Actions tab

concurrency:
  group: hrms-keepalive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep the server awake
        run: |
          # Long timeout + retries ride out a cold start if the app had slept.
          if curl -fsS --retry 5 --retry-all-errors --retry-delay 15 --max-time 150 https://hrms-rzfs.onrender.com/api/health; then
            echo ""
            echo "✅ pinged — server is awake."
          else
            echo "ping failed this round; the next run (≤10 min) will retry."
          fi
